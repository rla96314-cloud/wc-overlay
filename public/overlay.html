<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>WC Overlay</title>
<style>
  :root{
    --maroon:#6b1f3f;--maroon-dark:#561730;--gold:#caa15a;--text-dark:#5a1730;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;
    font-family:"Pretendard","Noto Sans KR","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    -webkit-font-smoothing:antialiased;}
  #stage{position:relative;width:1920px;height:1080px;}

  /* 위치/크기 편집 단위 블록 */
  .block{position:absolute;transform-origin:top left;}
  .el{transition:opacity .35s ease;}
  .hidden{opacity:0 !important;pointer-events:none;}
  #sound-unlock{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);display:none;
    background:rgba(107,31,63,.95);color:#fff;font-size:20px;font-weight:800;padding:12px 22px;
    border-radius:10px;cursor:pointer;z-index:9999;box-shadow:0 6px 18px rgba(0,0,0,.5);}

  /* 편집모드 표시 */
  body.edit .block{outline:2px dashed rgba(255,255,255,.45);cursor:move;}
  body.edit .block:hover{outline:2px dashed #ffd76a;}
  .tag{position:absolute;left:0;top:-22px;font-size:13px;color:#ffd76a;background:rgba(0,0,0,.7);
    padding:1px 7px;border-radius:4px;white-space:nowrap;display:none;font-family:monospace;}
  body.edit .tag{display:block;}

  .flag{display:inline-flex;align-items:center;justify-content:center;line-height:1;
    border-radius:3px;overflow:hidden;background:#fff;flex:none;}
  .flag img{width:100%;height:100%;object-fit:cover;display:block;}

  /* ───────── 스코어보드 ───────── */
  #scoreboard{width:700px;filter:drop-shadow(0 8px 22px rgba(0,0,0,.45));}
  .sb-title{background:linear-gradient(180deg,#7a2547,#5d1834);color:#f3e7ec;font-size:25px;
    font-weight:800;letter-spacing:.5px;text-align:center;padding:11px 0 10px;border-radius:6px 6px 0 0;
    display:flex;align-items:center;justify-content:center;gap:26px;}
  .sb-title .round{color:#e9c87f;font-weight:800;}
  .sb-body{display:flex;align-items:stretch;height:78px;}
  .sb-team{flex:1;display:flex;align-items:center;background:linear-gradient(180deg,#5f1a37,#4c1429);min-width:0;}
  .sb-team.away{flex-direction:row-reverse;}
  .sb-team .flag{width:64px;height:46px;font-size:38px;margin:0 14px;box-shadow:0 0 0 2px rgba(255,255,255,.85);}
  /* 이름: 남는 칸 가운데 정렬 + 너비 맞춰 글자크기 자동 축소(JS) */
  .sb-team .name{flex:1;min-width:0;color:#fff;font-size:34px;font-weight:800;letter-spacing:.3px;
    white-space:nowrap;overflow:hidden;text-align:center;padding:0 8px;line-height:1.1;}
  .sb-score{flex:none;width:200px;display:flex;align-items:center;justify-content:center;gap:18px;
    background:linear-gradient(180deg,#360c1d,#280714);color:#fff;font-size:52px;font-weight:900;}
  .sb-score .diamond{width:26px;height:26px;background:linear-gradient(135deg,#caa15a,#8a6c2f);
    transform:rotate(45deg);box-shadow:0 0 8px rgba(202,161,90,.6);}
  .sb-clock{margin:0 auto;width:260px;background:linear-gradient(180deg,#4c1429,#360c1d);color:#fff;
    font-size:30px;font-weight:800;letter-spacing:2px;text-align:center;padding:7px 0 8px;
    border-radius:0 0 7px 7px;box-shadow:0 6px 14px rgba(0,0,0,.4);}

  /* ───────── 골 알림 ───────── */
  #goal{width:740px;height:175px;filter:drop-shadow(0 14px 30px rgba(0,0,0,.5));}
  .goal-inner{display:flex;align-items:stretch;width:100%;height:100%;}
  /* 등장: 아래에서 살짝 올라오며 페이드인 */
  #goal:not(.hidden) .goal-inner{animation:goalIn .42s cubic-bezier(.18,.85,.25,1) both;}
  @keyframes goalIn{from{transform:translateY(34px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .goal-left{flex:none;width:215px;background:var(--maroon);display:flex;align-items:center;justify-content:center;
    gap:18px;border-radius:6px 0 0 6px;color:#fff;}
  .goal-ball{font-size:62px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));}
  .goal-min{font-size:54px;font-weight:900;}
  .goal-min .ap{font-size:32px;vertical-align:super;}
  .goal-right{flex:1;background:linear-gradient(180deg,#fbfafb,#e9e4e7);border-radius:0 6px 6px 0;
    display:flex;flex-direction:column;justify-content:center;padding-left:46px;}
  .goal-headline{color:var(--text-dark);font-size:52px;font-weight:900;letter-spacing:.5px;}

  /* ───────── 스코어 예측 (6인) ───────── */
  #predict{width:300px;border-radius:11px;overflow:hidden;filter:drop-shadow(0 8px 20px rgba(0,0,0,.45));}
  .pd-head{background:linear-gradient(180deg,#6b1f3f,#561730);color:#fff;text-align:center;font-size:26px;
    font-weight:900;padding:12px 0;letter-spacing:1px;}
  .pd-body{background:linear-gradient(180deg,rgba(40,12,24,.94),rgba(28,8,18,.94));padding:7px;
    display:flex;flex-direction:column;gap:7px;}
  .pd-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:9px 8px;border-radius:8px;
    background:linear-gradient(180deg,#5f1a37,#4c1429);transition:background .35s,opacity .35s,box-shadow .35s;}
  .pd-item.fail{background:linear-gradient(180deg,#34333b,#26262c);opacity:.5;}      /* 예측 실패 → 회색 */
  .pd-item.hit{background:linear-gradient(180deg,#caa15a,#9c7a32);box-shadow:0 0 0 2px #ffd76a inset;} /* 현재 적중 */
  .pd-name{color:#fff;font-size:25px;font-weight:800;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;max-width:100%;line-height:1.2;}
  .pd-score{font-size:33px;font-weight:900;color:#fff;letter-spacing:2px;font-variant-numeric:tabular-nums;}
  .pd-item.fail .pd-name,.pd-item.fail .pd-score{color:#bcb9c2;}
  .pd-item.hit .pd-name,.pd-item.hit .pd-score{color:#3a2600;}

  /* ───────── 득점 기록 창 ───────── */
  #goallog{width:340px;border-radius:10px;overflow:hidden;filter:drop-shadow(0 8px 20px rgba(0,0,0,.45));}
  .gl-head{background:linear-gradient(180deg,#6b1f3f,#561730);color:#fff;text-align:center;font-size:25px;
    font-weight:900;padding:11px 0;display:flex;align-items:center;justify-content:center;gap:10px;}
  .gl-body{background:linear-gradient(180deg,rgba(40,12,24,.92),rgba(28,8,18,.92));padding:8px 0;}
  .gl-item{display:flex;align-items:center;gap:12px;padding:9px 18px;color:#fff;font-size:24px;}
  .gl-item + .gl-item{border-top:1px solid rgba(255,255,255,.08);}
  .gl-min{color:#e9c87f;font-weight:900;min-width:54px;}
  .gl-dot{width:14px;height:10px;border-radius:2px;flex:none;}
  .gl-dot.home{background:#3f7dd6;} .gl-dot.away{background:#d65a5a;}
  .gl-scorer{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gl-empty{color:#cabac3;font-size:20px;text-align:center;padding:14px 0;}

  /* ───────── 뉴스 티커 ───────── */
  #ticker{width:1750px;height:56px;display:flex;align-items:stretch;border-radius:6px;overflow:hidden;
    box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .ticker-label{flex:none;background:linear-gradient(180deg,#8a2750,#641a39);color:#fff;font-size:27px;
    font-weight:900;display:flex;align-items:center;padding:0 26px;letter-spacing:1px;}
  .ticker-track{flex:1;background:linear-gradient(180deg,#5d1834,#420f24);overflow:hidden;position:relative;}
  .ticker-text{position:absolute;top:50%;white-space:nowrap;color:#fff;font-size:28px;font-weight:700;
    left:100%;transform:translateY(-50%);animation:scroll-left 40s linear infinite;}
  @keyframes scroll-left{from{transform:translate(0,-50%);}to{transform:translate(calc(-100% - 1750px),-50%);}}
</style>
</head>
<body>
<div id="stage">

  <div class="block el" id="scoreboard" data-block="scoreboard">
    <span class="tag"></span>
    <div class="sb-title"><span id="sb-meta"></span><span class="round" id="sb-round"></span></div>
    <div class="sb-body">
      <div class="sb-team home"><span class="flag" id="sb-home-flag"></span><span class="name" id="sb-home-name"></span></div>
      <div class="sb-score"><span id="sb-home-score"></span><span class="diamond"></span><span id="sb-away-score"></span></div>
      <div class="sb-team away"><span class="flag" id="sb-away-flag"></span><span class="name" id="sb-away-name"></span></div>
    </div>
    <div class="sb-clock" id="sb-clock"></div>
  </div>

  <div class="block el" id="goal" data-block="goal">
    <span class="tag"></span>
    <div class="goal-inner">
      <div class="goal-left"><span class="goal-ball">⚽</span><span class="goal-min" id="gl-min"></span></div>
      <div class="goal-right"><div class="goal-headline" id="gl-headline"></div></div>
    </div>
  </div>

  <div class="block el" id="predict" data-block="predict">
    <span class="tag"></span>
    <div class="pd-head" id="pd-title"></div>
    <div class="pd-body" id="pd-body"></div>
  </div>

  <div class="block el" id="goallog" data-block="goallog">
    <span class="tag"></span>
    <div class="gl-head">⚽ <span id="glg-title"></span></div>
    <div class="gl-body" id="glg-body"></div>
  </div>

  <div class="block el" id="ticker" data-block="ticker">
    <span class="tag"></span>
    <div class="ticker-label" id="tk-label"></div>
    <div class="ticker-track"><div class="ticker-text" id="tk-text"></div></div>
  </div>

</div>

<audio id="goal-audio" preload="auto"></audio>
<div id="sound-unlock">🔊 클릭하여 사운드 활성화</div>

<script>
  const $ = (id) => document.getElementById(id);
  const setText = (id, v) => { const e = $(id); if (e) e.textContent = v ?? ""; };
  const toggle = (id, show) => { const e = $(id); if (e) e.classList.toggle("hidden", !show); };
  const flag = (id, v) => { const e = $(id); if (!e) return;
    if (/^https?:/.test(v || "")) e.innerHTML = `<img src="${v}">`; else e.textContent = v ?? ""; };

  const params = new URLSearchParams(location.search);
  let editMode = params.has("edit");
  let S = null;

  function placeBlocks(s) {
    for (const key of Object.keys(s.layout || {})) {
      const el = document.querySelector(`[data-block="${key}"]`);
      if (!el) continue;
      const L = s.layout[key];
      el.style.left = L.x + "px";
      el.style.top = L.y + "px";
      el.style.transform = `scale(${L.scale || 1})`;
      const tag = el.querySelector(".tag");
      if (tag) tag.textContent = `${key}  x:${Math.round(L.x)} y:${Math.round(L.y)} ×${(L.scale||1).toFixed(2)}`;
    }
  }

  function renderGoalLog(s) {
    const body = $("glg-body");
    setText("glg-title", s.goallog.title);
    if (!s.goallog.items.length) { body.innerHTML = `<div class="gl-empty">아직 득점이 없습니다</div>`; return; }
    body.innerHTML = s.goallog.items.map((g) => `
      <div class="gl-item">
        <span class="gl-min">${(g.minute||"").replace(/'/,"")}'</span>
        <span class="gl-dot ${g.team}"></span>
        <span class="gl-scorer">${g.scorer ? esc(g.scorer) : esc(g.teamName)}</span>
      </div>`).join("");
  }
  const esc = (t) => String(t).replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));

  // 스코어 예측: 내 스코어보드(실제)와 비교 → 실제가 예측을 넘어서면 실패(회색), 현재 일치면 적중(금색)
  function renderPredict(s) {
    setText("pd-title", s.predict.title);
    const ah = Number(s.scoreboard.homeScore) || 0, aa = Number(s.scoreboard.awayScore) || 0;
    $("pd-body").innerHTML = (s.predict.items || []).map((p) => {
      const ph = Number(p.home) || 0, pa = Number(p.away) || 0;
      const fail = ah > ph || aa > pa;          // 더 이상 맞출 수 없음 → 회색
      const hit = !fail && ah === ph && aa === pa; // 지금 정확히 일치
      const cls = fail ? "fail" : (hit ? "hit" : "");
      return `<div class="pd-item ${cls}"><div class="pd-name">${esc(p.name || "")}</div><div class="pd-score">${ph} : ${pa}</div></div>`;
    }).join("");
  }

  // 팀 이름: 칸 너비에 맞춰 글자크기 자동 축소
  function fitName(id, max = 34, min = 14) {
    const el = $(id); if (!el) return;
    el.style.fontSize = max + "px";
    let s = max, guard = 0;
    while (s > min && el.scrollWidth > el.clientWidth + 1 && guard++ < 60) { s -= 1; el.style.fontSize = s + "px"; }
  }
  function fitNames() { fitName("sb-home-name"); fitName("sb-away-name"); }
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitNames);

  function render(s) {
    S = s;
    // 스코어보드
    setText("sb-meta", s.scoreboard.title); setText("sb-round", s.scoreboard.round);
    flag("sb-home-flag", s.scoreboard.homeFlag); setText("sb-home-name", s.scoreboard.homeName);
    setText("sb-home-score", s.scoreboard.homeScore); setText("sb-away-score", s.scoreboard.awayScore);
    flag("sb-away-flag", s.scoreboard.awayFlag); setText("sb-away-name", s.scoreboard.awayName);
    toggle("scoreboard", s.scoreboard.show);
    requestAnimationFrame(fitNames);
    // 골
    $("gl-min").innerHTML = String(s.goal.minute || "").replace(/'/g, "<span class='ap'>'</span>");
    setText("gl-headline", s.goal.headline); toggle("goal", s.goal.show);
    // 스코어 예측 (실제 점수와 비교)
    renderPredict(s); toggle("predict", s.predict.show);
    // 득점기록
    renderGoalLog(s); toggle("goallog", s.goallog.show);
    // 티커
    setText("tk-label", s.ticker.label);
    if ($("tk-text").textContent !== s.ticker.text) setText("tk-text", s.ticker.text);
    toggle("ticker", s.ticker.show);

    placeBlocks(s);
    document.body.classList.toggle("edit", editMode || !!s.editMode);
    handleSound(s);
  }

  // ── 골 사운드 재생 ──
  let lastSoundToken = null;     // 최초 로드값은 재생하지 않음
  let audioUnlocked = false;
  const audio = $("goal-audio");
  function soundURL(src) { return /^https?:/.test(src || "") ? src : ("/sounds/" + encodeURIComponent(src || "")); }
  function handleSound(s) {
    const ev = s.soundEvent || { token: 0 };
    if (lastSoundToken === null) { lastSoundToken = ev.token; return; }
    if (ev.token === lastSoundToken) return;
    lastSoundToken = ev.token;
    if (!s.sound || !s.sound.enabled) return;
    const src = ev.team === "away" ? s.sound.away : s.sound.home;
    if (!src) return;
    audio.src = soundURL(src);
    audio.volume = Math.max(0, Math.min(1, Number(s.sound.volume) ?? 0.8));
    audio.currentTime = 0;
    audio.play().then(() => { audioUnlocked = true; })
      .catch(() => { if (!audioUnlocked) $("sound-unlock").style.display = "block"; });
  }
  // 일반 브라우저 자동재생 차단 대비 — 한 번 클릭으로 해제(vMix는 불필요)
  $("sound-unlock").addEventListener("click", () => {
    audio.play().then(() => { audioUnlocked = true; $("sound-unlock").style.display = "none"; }).catch(() => {});
  });
  document.addEventListener("click", () => { if (!audioUnlocked) { audio.play().then(() => { audioUnlocked = true; audio.pause(); $("sound-unlock").style.display = "none"; }).catch(() => {}); } }, { once: false });

  // 타이머: 로컬 틱(서버 _clock 기준)
  function tickClock() {
    if (!S) return;
    const t = S.timer, base = S._clock || {};
    let sec = (t.elapsedSec || 0);
    if (t.running && t.startedAt) sec += (Date.now() - t.startedAt) / 1000;
    const mm = String(Math.floor(sec / 60)).padStart(2, "0");
    const ss = String(Math.floor(sec % 60)).padStart(2, "0");
    const label = t.half === 2 ? t.label2 : t.label1;
    setText("sb-clock", `${label} ${mm}:${ss}`);
  }
  setInterval(tickClock, 200);

  // SSE
  const es = new EventSource("/events");
  es.onmessage = (e) => { try { render(JSON.parse(e.data)); tickClock(); } catch {} };

  // ── 편집모드: 드래그 이동 + 휠 스케일 ──
  let drag = null;
  document.addEventListener("mousedown", (e) => {
    if (!(editMode || (S && S.editMode))) return;
    const block = e.target.closest(".block"); if (!block) return;
    const key = block.dataset.block; const L = S.layout[key];
    drag = { key, block, sx: e.clientX, sy: e.clientY, ox: L.x, oy: L.y };
    e.preventDefault();
  });
  document.addEventListener("mousemove", (e) => {
    if (!drag) return;
    const nx = drag.ox + (e.clientX - drag.sx), ny = drag.oy + (e.clientY - drag.sy);
    drag.block.style.left = nx + "px"; drag.block.style.top = ny + "px";
    S.layout[drag.key].x = nx; S.layout[drag.key].y = ny;
    const tag = drag.block.querySelector(".tag");
    if (tag) tag.textContent = `${drag.key}  x:${Math.round(nx)} y:${Math.round(ny)} ×${(S.layout[drag.key].scale||1).toFixed(2)}`;
  });
  document.addEventListener("mouseup", () => {
    if (!drag) return;
    const key = drag.key, L = S.layout[key]; drag = null;
    fetch("/update", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ layout: { [key]: { x: L.x, y: L.y } } }) });
  });
  document.addEventListener("wheel", (e) => {
    if (!(editMode || (S && S.editMode))) return;
    const block = e.target.closest(".block"); if (!block) return;
    const key = block.dataset.block, L = S.layout[key];
    let sc = (L.scale || 1) + (e.deltaY < 0 ? 0.03 : -0.03); sc = Math.max(0.3, Math.min(3, sc));
    L.scale = sc; block.style.transform = `scale(${sc})`;
    e.preventDefault();
    clearTimeout(window.__wheelT);
    window.__wheelT = setTimeout(() => fetch("/update", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ layout: { [key]: { scale: sc } } }) }), 250);
  }, { passive: false });
</script>
</body>
</html>
